[build]
  command = "npm run build && php artisan config:cache"
  publish = "public"

[build.environment]
  PHP_VERSION = "8.2"
  NODE_VERSION = "20"

[[redirects]]
  from = "/build/*"
  to = "/build/:splat"
  status = 200

[[redirects]]
  from = "/storage/*"
  to = "/storage/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.php"
  status = 200

